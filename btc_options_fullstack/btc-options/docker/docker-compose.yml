version: "3.9"
services:
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - ../backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - TIMESCALE_URL=postgresql://btcuser:btcpass@timescaledb:5432/btcoptions
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    restart: unless-stopped

  #  frontend:
  #    build:
  #      context: ../frontend
  #      dockerfile: ../docker/Dockerfile.frontend
  #    ports:
  #      - "3000:80"
  #    depends_on:
  #      - backend
  #    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data

  timescaledb:
    image: timescale/timescaledb:latest-pg15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: btcoptions
      POSTGRES_USER: btcuser
      POSTGRES_PASSWORD: btcpass
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U btcuser -d btcoptions"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  redis_data:
  timescale_data:
