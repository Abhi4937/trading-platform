version: "3.9"
services:
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - ../backend/.env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  #  frontend:
  #    build:
  #      context: ../frontend
  #      dockerfile: ../docker/Dockerfile.frontend
  #    ports:
  #      - "3000:80"
  #    depends_on:
  #      - backend
  #    restart: unless-stopped
    
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data

volumes:
  redis_data:
